<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Evil: Armageddon - Arquivo Classificado</title>
  <style>
    /* ========================================
           RESETAR ESTILOS PADRÃO
           ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ========================================
           CORES E VARIÁVEIS (Fácil customização)
           ======================================== */
    :root {
      --cor-fundo-principal: #0a0e1a;
      --cor-fundo-secundaria: #1a2437;
      --cor-fundo-painel: #172138;
      --cor-borda: #2a5f7f;
      --cor-borda-escura: #0f1820;
      --cor-texto-principal: #b8d4e8;
      --cor-texto-secundario: #7a9bb0;
      --cor-destaque: #00d4ff;
      --cor-perigo: #ff4444;
      --cor-hover: #1e3a52;
      --cor-sombra: rgba(0, 0, 0, 0.6);
    }

    /* ========================================
           BODY E CONTAINERS PRINCIPAIS
           ======================================== */
    body {
      font-family: "Courier New", monospace;
      background: linear-gradient(135deg,
          var(--cor-fundo-principal) 0%,
          var(--cor-fundo-secundaria) 100%);
      color: var(--cor-texto-principal);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Efeito de scan de CRT (opcional) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(0deg,
          transparent 24%,
          rgba(0, 212, 255, 0.05) 25%,
          rgba(0, 212, 255, 0.05) 26%,
          transparent 27%,
          transparent 74%,
          rgba(0, 212, 255, 0.05) 75%,
          rgba(0, 212, 255, 0.05) 76%,
          transparent 77%,
          transparent),
        linear-gradient(90deg,
          transparent 24%,
          rgba(0, 212, 255, 0.03) 25%,
          rgba(0, 212, 255, 0.03) 26%,
          transparent 27%,
          transparent 74%,
          rgba(0, 212, 255, 0.03) 75%,
          rgba(0, 212, 255, 0.03) 76%,
          transparent 77%,
          transparent);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      display: flex;
      min-height: 100vh;
      gap: 0;
      position: relative;
      z-index: 0;
    }

    /* ========================================
           BARRA LATERAL (SIDEBAR)
           ======================================== */
    .sidebar {
      width: 240px;
      background: var(--cor-fundo-painel);
      border-right: 3px solid var(--cor-borda);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      box-shadow: 2px 0 15px var(--cor-sombra);
      position: relative;
      z-index: 2;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-titulo {
      font-size: 20px;
      font-weight: bold;
      color: var(--cor-destaque);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--cor-destaque);
      margin-bottom: 8px;
    }

    .logo-subtitulo {
      font-size: 11px;
      color: var(--cor-texto-secundario);
      letter-spacing: 1px;
    }

    /* Separador visual */
    .divisor {
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          var(--cor-borda),
          transparent);
      margin: 10px 0;
    }

    .menu-secao {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-titulo {
      font-size: 12px;
      color: var(--cor-destaque);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 10px;
      border-left: 2px solid var(--cor-destaque);
      padding-left: 8px;
      opacity: 0.8;
    }

    .side-btn {
      padding: 12px 15px;
      border: 1px solid var(--cor-borda);
      background: var(--cor-fundo-secundaria);
      color: var(--cor-texto-principal);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 13px;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .side-btn:before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--cor-hover);
      z-index: -1;
      transition: left 0.3s ease;
    }

    .side-btn:hover,
    .side-btn.ativo-arquivo {
      color: var(--cor-destaque);
      border-color: var(--cor-destaque);
      text-shadow: 0 0 8px var(--cor-destaque);
    }

    .side-btn:hover:before,
    .side-btn.ativo-arquivo:before {
      left: 0;
    }

    /* ========================================
           CONTEÚDO PRINCIPAL
           ======================================== */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--cor-fundo-principal);
      overflow-y: auto;
      position: relative;
      z-index: 0;
    }

    /* BARRA DE PERSONAGENS */
    .topbar {
      display: flex;
      gap: 10px;
      padding: 20px;
      background: var(--cor-fundo-painel);
      border-bottom: 3px solid var(--cor-borda);
      overflow-x: auto;
      flex-wrap: wrap;
      box-shadow: 0 3px 10px var(--cor-sombra);
    }

    .char-btn {
      padding: 10px 18px;
      background: var(--cor-fundo-secundaria);
      border: 1px solid var(--cor-borda);
      color: var(--cor-texto-principal);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 13px;
      transition: 0.3s ease;
      white-space: nowrap;
      position: relative;
    }

    .char-btn.ativo {
      background: var(--cor-destaque);
      color: #0a0e1a;
      border-color: var(--cor-destaque);
      font-weight: bold;
      box-shadow: 0 0 15px var(--cor-destaque);
    }

    .char-btn:hover:not(.ativo) {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
    }

    /* CABEÇALHO COM TÍTULO */
    .header {
      padding: 30px;
      background: linear-gradient(135deg,
          var(--cor-fundo-painel) 0%,
          var(--cor-fundo-secundaria) 100%);
      border-bottom: 2px solid var(--cor-borda);
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
      color: var(--cor-destaque);
      letter-spacing: 3px;
      text-shadow: 0 0 20px var(--cor-destaque);
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      color: var(--cor-texto-secundario);
      letter-spacing: 1px;
    }

    /* FICHA DO PERSONAGEM */
    .character-sheet {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr;
      gap: 25px;
      padding: 30px;
      flex: 1;
    }

    /* TELA DE ARQUIVO */
    .arquivo-view {
      padding: 30px;
      display: none;
      flex-direction: column;
      gap: 25px;
    }

    .arquivo-view.ativo {
      display: flex;
    }

    /* PAINÉIS DE INFORMAÇÃO */
    .panel {
      background: var(--cor-fundo-painel);
      border: 2px solid var(--cor-borda);
      padding: 25px;
      box-shadow: 0 5px 20px var(--cor-sombra);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
          transparent,
          var(--cor-destaque),
          transparent);
    }

    .panel h2 {
      margin-bottom: 20px;
      border-bottom: 2px solid var(--cor-borda);
      padding-bottom: 12px;
      color: var(--cor-destaque);
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .panel h3 {
      color: var(--cor-destaque);
      margin-bottom: 15px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .panel p {
      text-align: justify;
      line-height: 1.8;
      font-size: 14px;
      color: var(--cor-texto-principal);
    }

    /* IMAGEM DO PERSONAGEM/ARQUIVO */
    .character-image,
    .arquivo-image {
      width: 100%;
      height: 450px;
      object-fit: cover;
      border: 3px solid var(--cor-borda);
      box-shadow: 0 5px 20px var(--cor-sombra);
      filter: brightness(0.95) contrast(1.1) saturate(0.9);
      margin-bottom: 15px;
    }

    /* LABELS E INFORMAÇÕES ORGANIZADAS */
    .info-label {
      color: var(--cor-destaque);
      font-weight: bold;
      font-size: 13px;
      margin-top: 15px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-content {
      color: var(--cor-texto-principal);
      font-size: 14px;
      margin-bottom: 15px;
      padding-left: 15px;
      border-left: 2px solid var(--cor-borda);
    }

    /* LISTA COM BULLET POINTS */
    .lista-observacoes {
      list-style: none;
    }

    .lista-observacoes li {
      margin-bottom: 12px;
      padding-left: 20px;
      position: relative;
      font-size: 14px;
    }

    .lista-observacoes li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--cor-destaque);
    }

    /* STATUS BADGE */
    .status-badge {
      display: inline-block;
      padding: 8px 15px;
      background: var(--cor-perigo);
      color: white;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 15px;
      border: 1px solid var(--cor-perigo);
      box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
      text-transform: uppercase;
    }

    /* ========================================
           SEÇÃO DE ENREDO/HISTÓRIA
           ======================================== */
    .story-section {
      padding: 30px;
      background: var(--cor-fundo-painel);
      border: 2px solid var(--cor-borda);
      margin: 0 30px 30px 30px;
      box-shadow: 0 5px 20px var(--cor-sombra);
    }

    .story-section h3 {
      color: var(--cor-destaque);
      margin-bottom: 15px;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ========================================
           RESPONSIVO
           ======================================== */
    @media (max-width: 1200px) {
      .character-sheet {
        grid-template-columns: 1fr;
      }

      .sidebar {
        width: 200px;
        padding: 20px 15px;
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        padding: 20px;
        gap: 15px;
      }

      .header h1 {
        font-size: 32px;
      }

      .character-sheet {
        padding: 15px;
        gap: 15px;
      }

      .topbar {
        padding: 15px;
      }

      .panel {
        padding: 15px;
      }
    }

    /* ========================================
           SCROLL BAR ESTILIZADO
           ======================================== */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--cor-fundo-painel);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cor-borda);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--cor-destaque);
      box-shadow: 0 0 10px var(--cor-destaque);
    }
  </style>
</head>

  <script>
    // ┌─────────────────────────────────────────────────────────────┐

    // │ ADICIONE AQUI NOVOS PERSONAGENS CONFORME NECESSÁRIO         │

    const personagens = [{
      // PERSONAGEM 1 - EDITAR CONFORME NECESSÁRIO
      nome: "Jonathan Elias Bravo",
      imagem: "https://assets3.thrillist.com/v1/image/2664834/1584x2046/scale;webp=auto;jpeg_quality=60.jpg",
      idade: "34 anos",
      ocupacao: "Policial Civil",
      altura: "1,78m",
      genero: "Masculino",
      orientacao_sexual: "Bissexual",
      personalidade: `Um policial decadente de natureza cética e áspera, que usa o humor ácido como única trincheira contra um desespero que conhece pelo nome; por baixo da casca de sarcasmo e da postura relaxada de quem já desistiu de tentar, há uma lealdade feroz que ele mesmo trata como fraqueza. Lealdade a poucos, canina e suja, dessas que não pedem perdão nem aplauso. Sua autoestima é tão subterrânea que ele aprendeu a confundir abandono com liberdade, e afeto com armadilha. Não se considera religioso, mas odeia igrejas com um fervor quase devocional, menos por teologia e mais porque aprendeu cedo que a religião é o ópio do povo. Tem o hábito de provocar os outros até testar se vão ficar, ri da própria desgraça com uma risada seca e, no fundo, carrega o medo silencioso de que alguém o leve a sério tempo o bastante para descobrir que ele já se quebrou todo por dentro, e só se mantém em pé por manha, vício e um resto de orgulho maluco.`,
      historia: `Natural de Araguaia do Norte – MT. Criado em uma família disfuncional, aprendeu cedo que afeto e confiança são mercadorias de troca instável. Aos vinte e quatro anos, casou-se com Lara dos Santos Almeida. O casamento foi menos um gesto de amor do que uma rota de fuga: sair daquela casa que o adoecia em vez de consertá-la. A união durou oito anos, não produziu filhos e terminou em divórcio há dois anos. Lara ficou no passado, e ele, em certa medida, também.
          
          Transferido de volta para Araguaia há um ano e meio, a mesma cidade que um dia jurou nunca mais pisar. O retorno não foi uma escolha, mas uma determinação funcional. Desde então, a carreira não decolou. Acumula fracassos afetivos como quem acumula dias iguais: sem surpresa, sem variação, apenas a repetição cansada do mesmo padrão. Sua autoestima é baixa, crônica, quase um dado de identidade.
          
          O futuro, para ele, é apenas uma ideia vaga, sem endereço fixo.
          
          Hoje vive entre o humor ácido e o silêncio. Ri da própria desgraça e da alheia, não por crueldade, mas por falta de vocabulário para lidar com o desespero de outro jeito. Não frequenta igrejas, não se declara religioso, mas carrega consigo uma fé negativa: a certeza de que nada vai melhorar, e que rir é a única resposta que não dói tanto.`,
      observacoes: [
        "Ri alto em situações de luto ou tragédia, o que já lhe rendeu olhares hostis em velórios",

        "Tem uma cicatriz no antebraço esquerdo que atribui a 'um acidente doméstico', mas a história muda a cada vez",
        "Evita qualquer contato físico prolongado, especialmente abraços",
        "Tem o hábito de responder perguntas sinceras com outra pergunta",
        "Evita atravessar na frente de igrejas, preferindo dar a volta quarteirão mesmo sob chuva",

    },];
    // ┌─────────────────────────────────────────────────────────────┐
    // │ BANCO DE DADOS DOS ARQUIVOS/LOCALIZAÇÕES                    │
    // │ ADICIONE AQUI NOVOS ARQUIVOS CONFORME NECESSÁRIO            │

    const arquivos = [{
      id: "araguaia",
      nome: "Araguaia do Norte - MT",
      imagem: "https://upload.wikimedia.org/wikipedia/commons/7/7b/Inhumas_-_Goias_-_Brasil_02.jpg?w=1200&h=600&fit=crop",
      descricao: `<p>
          O município de Araguaia do Norte localiza-se na região nordeste do estado de Mato Grosso, próximo à divisa natural formada pelo Rio Araguaia e às áreas de expansão agropecuária do chamado Corredor Norte de Escoamento. Possui população estimada em aproximadamente 50 mil habitantes, distribuídos entre a área urbana central, bairros periféricos de crescimento irregular e comunidades rurais ligadas à produção agrícola e pecuária extensiva.
          </p></br>
          <p>
          A economia municipal depende majoritariamente do agronegócio, especialmente da criação bovina, cultivo de soja, milho e transporte de cargas. A cidade funciona como ponto logístico intermediário entre fazendas da região e centros maiores de distribuição, o que resulta em intenso fluxo de caminhões e veículos utilitários pelas principais vias urbanas. O setor de serviços apresenta crescimento moderado, sustentado por supermercados, oficinas mecânicas, lojas agropecuárias e pequenas redes comerciais locais.
          </p></br>
          <p>
          O núcleo urbano concentra-se ao redor da Avenida Central, principal eixo viário do município, onde se encontram repartições públicas, agências bancárias, farmácias, restaurantes populares e o único shopping center da cidade, inaugurado em 2014. Apesar da expectativa inicial de modernização econômica, o empreendimento apresentou desempenho abaixo do esperado devido à baixa circulação noturna e à concorrência do comércio tradicional de rua.
          </p></br>
          <p>
          A infraestrutura urbana permanece considerada limitada para o porte populacional atual. O sistema hospitalar municipal opera frequentemente acima da capacidade projetada, sobretudo no Hospital Regional de Araguaia do Norte, referência para municípios vizinhos menores. Há registros recorrentes de falta de profissionais especializados, superlotação do pronto atendimento e interrupções ocasionais no abastecimento de medicamentos básicos.
          </p></br>
          <p>
          A segurança pública é atendida por uma delegacia regional instalada em estrutura antiga, originalmente construída ainda durante o período em que Araguaia do Norte era classificada como distrito administrativo rural. O prédio apresenta sinais avançados de deterioração estrutural, incluindo infiltrações, falhas elétricas e celas desativadas por problemas de segurança. O efetivo policial disponível é considerado insuficiente para a atual demanda urbana e rural.
          </p></br>
          <p>
          Os bairros periféricos cresceram rapidamente ao longo da última década, impulsionados pela migração de trabalhadores vindos de outras regiões do país. Parte dessas áreas apresenta pavimentação incompleta, iluminação pública precária e sistemas de saneamento improvisados. Durante o período chuvoso, diversas vias tornam-se praticamente intransitáveis devido ao acúmulo de lama vermelha característica do solo local.
          </p></br>
          <p>
          Culturalmente, o município mantém forte influência sertaneja e religiosa. Festas agropecuárias, cavalgadas e eventos evangélicos reúnem grande parte da população ao longo do ano. A vida noturna é reduzida e concentrada em poucos bares, postos de combustível e conveniências que permanecem abertas após as 22h.
          </p></br>
          <p>
          Durante a noite, a cidade apresenta significativa redução no fluxo de pessoas. Após o fechamento do comércio, grande parte das ruas permanece praticamente vazia, iluminada apenas por postes de vapor metálico antigos e pela circulação esporádica de veículos de carga. Moradores locais frequentemente descrevem o ambiente noturno como “silencioso demais”, especialmente nas áreas próximas ao rio e aos bairros industriais.
          </p>`,
      conteudo: `
            <h3>Registro Histórico - Araguaia do Norte</h3>
            <p>
            Os primeiros registros de ocupação da área correspondente a Araguaia do Norte remontam ao início da década de 1970, durante os projetos federais de expansão territorial e colonização agrícola do Centro-Oeste brasileiro. À época, a região era composta majoritariamente por mata nativa, áreas alagadiças e pequenas rotas de garimpo informal utilizadas por grupos itinerantes.
            </p></br>

            <p>
            O povoado surgiu inicialmente como um ponto de parada improvisado para caminhoneiros e trabalhadores rurais que atravessavam estradas de terra em direção às novas fazendas abertas no norte do estado. Barracões de madeira, oficinas mecânicas rudimentares e pequenos comércios abasteciam viajantes que permaneciam dias isolados devido às condições precárias das rotas durante o período de chuvas.
            </p></br>

            <p>
            Em 1978, o governo estadual reconheceu oficialmente o núcleo urbano como distrito administrativo. O nome “Araguaia do Norte” foi adotado em referência ao rio que margeia a região e ao posicionamento geográfico estratégico dentro das novas frentes de expansão econômica do estado.
            </p></br>
