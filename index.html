<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Evil: Armageddon - Arquivo Classificado</title>
  <style>
    /* ========================================
           RESETAR ESTILOS PADRÃO
           ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ========================================
           CORES E VARIÁVEIS (Fácil customização)
           ======================================== */
    :root {
      --cor-fundo-principal: #0a0e1a;
      --cor-fundo-secundaria: #1a2437;
      --cor-fundo-painel: #172138;
      --cor-borda: #2a5f7f;
      --cor-borda-escura: #0f1820;
      --cor-texto-principal: #b8d4e8;
      --cor-texto-secundario: #7a9bb0;
      --cor-destaque: #00d4ff;
      --cor-perigo: #ff4444;
      --cor-hover: #1e3a52;
      --cor-sombra: rgba(0, 0, 0, 0.6);
    }

    /* ========================================
           BODY E CONTAINERS PRINCIPAIS
           ======================================== */
    body {
      font-family: "Courier New", monospace;
      background: linear-gradient(135deg,
          var(--cor-fundo-principal) 0%,
          var(--cor-fundo-secundaria) 100%);
      color: var(--cor-texto-principal);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Efeito de scan de CRT (opcional) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(0deg,
          transparent 24%,
          rgba(0, 212, 255, 0.05) 25%,
          rgba(0, 212, 255, 0.05) 26%,
          transparent 27%,
          transparent 74%,
          rgba(0, 212, 255, 0.05) 75%,
          rgba(0, 212, 255, 0.05) 76%,
          transparent 77%,
          transparent),
        linear-gradient(90deg,
          transparent 24%,
          rgba(0, 212, 255, 0.03) 25%,
          rgba(0, 212, 255, 0.03) 26%,
          transparent 27%,
          transparent 74%,
          rgba(0, 212, 255, 0.03) 75%,
          rgba(0, 212, 255, 0.03) 76%,
          transparent 77%,
          transparent);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      display: flex;
      min-height: 100vh;
      gap: 0;
      position: relative;
      z-index: 0;
    }

    /* ========================================
           BARRA LATERAL (SIDEBAR)
           ======================================== */
    .sidebar {
      width: 240px;
      background: var(--cor-fundo-painel);
      border-right: 3px solid var(--cor-borda);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      box-shadow: 2px 0 15px var(--cor-sombra);
      position: relative;
      z-index: 2;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-titulo {
      font-size: 20px;
      font-weight: bold;
      color: var(--cor-destaque);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--cor-destaque);
      margin-bottom: 8px;
    }

    .logo-subtitulo {
      font-size: 11px;
      color: var(--cor-texto-secundario);
      letter-spacing: 1px;
    }

    /* Separador visual */
    .divisor {
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          var(--cor-borda),
          transparent);
      margin: 10px 0;
    }

    .menu-secao {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-titulo {
      font-size: 12px;
      color: var(--cor-destaque);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 10px;
      border-left: 2px solid var(--cor-destaque);
      padding-left: 8px;
      opacity: 0.8;
    }

    .side-btn {
      padding: 12px 15px;
      border: 1px solid var(--cor-borda);
      background: var(--cor-fundo-secundaria);
      color: var(--cor-texto-principal);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 13px;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .side-btn:before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--cor-hover);
      z-index: -1;
      transition: left 0.3s ease;
    }

    .side-btn:hover,
    .side-btn.ativo-arquivo {
      color: var(--cor-destaque);
      border-color: var(--cor-destaque);
      text-shadow: 0 0 8px var(--cor-destaque);
    }

    .side-btn:hover:before,
    .side-btn.ativo-arquivo:before {
      left: 0;
    }

    /* ========================================
           CONTEÚDO PRINCIPAL
           ======================================== */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--cor-fundo-principal);
      overflow-y: auto;
      position: relative;
      z-index: 0;
    }

    /* BARRA DE PERSONAGENS */
    .topbar {
      display: flex;
      gap: 10px;
      padding: 20px;
      background: var(--cor-fundo-painel);
      border-bottom: 3px solid var(--cor-borda);
      overflow-x: auto;
      flex-wrap: wrap;
      box-shadow: 0 3px 10px var(--cor-sombra);
    }

    .char-btn {
      padding: 10px 18px;
      background: var(--cor-fundo-secundaria);
      border: 1px solid var(--cor-borda);
      color: var(--cor-texto-principal);
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 13px;
      transition: 0.3s ease;
      white-space: nowrap;
      position: relative;
    }

    .char-btn.ativo {
      background: var(--cor-destaque);
      color: #0a0e1a;
      border-color: var(--cor-destaque);
      font-weight: bold;
      box-shadow: 0 0 15px var(--cor-destaque);
    }

    .char-btn:hover:not(.ativo) {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
    }

    /* CABEÇALHO COM TÍTULO */
    .header {
      padding: 30px;
      background: linear-gradient(135deg,
          var(--cor-fundo-painel) 0%,
          var(--cor-fundo-secundaria) 100%);
      border-bottom: 2px solid var(--cor-borda);
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
      color: var(--cor-destaque);
      letter-spacing: 3px;
      text-shadow: 0 0 20px var(--cor-destaque);
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      color: var(--cor-texto-secundario);
      letter-spacing: 1px;
    }

    /* FICHA DO PERSONAGEM */
    .character-sheet {
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr;
      gap: 25px;
      padding: 30px;
      flex: 1;
    }

    /* TELA DE ARQUIVO */
    .arquivo-view {
      padding: 30px;
      display: none;
      flex-direction: column;
      gap: 25px;
    }

    .arquivo-view.ativo {
      display: flex;
    }

    /* PAINÉIS DE INFORMAÇÃO */
    .panel {
      background: var(--cor-fundo-painel);
      border: 2px solid var(--cor-borda);
      padding: 25px;
      box-shadow: 0 5px 20px var(--cor-sombra);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
          transparent,
          var(--cor-destaque),
          transparent);
    }

    .panel h2 {
      margin-bottom: 20px;
      border-bottom: 2px solid var(--cor-borda);
      padding-bottom: 12px;
      color: var(--cor-destaque);
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .panel h3 {
      color: var(--cor-destaque);
      margin-bottom: 15px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .panel p {
      text-align: justify;
      line-height: 1.8;
      font-size: 14px;
      color: var(--cor-texto-principal);
    }

    /* IMAGEM DO PERSONAGEM/ARQUIVO */
    .character-image,
    .arquivo-image {
      width: 100%;
      height: 450px;
      object-fit: cover;
      border: 3px solid var(--cor-borda);
      box-shadow: 0 5px 20px var(--cor-sombra);
      filter: brightness(0.95) contrast(1.1) saturate(0.9);
      margin-bottom: 15px;
    }

    /* LABELS E INFORMAÇÕES ORGANIZADAS */
    .info-label {
      color: var(--cor-destaque);
      font-weight: bold;
      font-size: 13px;
      margin-top: 15px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-content {
      color: var(--cor-texto-principal);
      font-size: 14px;
      margin-bottom: 15px;
      padding-left: 15px;
      border-left: 2px solid var(--cor-borda);
    }

    /* LISTA COM BULLET POINTS */
    .lista-observacoes {
      list-style: none;
    }

    .lista-observacoes li {
      margin-bottom: 12px;
      padding-left: 20px;
      position: relative;
      font-size: 14px;
    }

    .lista-observacoes li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--cor-destaque);
    }

    /* STATUS BADGE */
    .status-badge {
      display: inline-block;
      padding: 8px 15px;
      background: var(--cor-perigo);
      color: white;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 15px;
      border: 1px solid var(--cor-perigo);
      box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
      text-transform: uppercase;
    }

    /* ========================================
           SEÇÃO DE ENREDO/HISTÓRIA
           ======================================== */
    .story-section {
      padding: 30px;
      background: var(--cor-fundo-painel);
      border: 2px solid var(--cor-borda);
      margin: 0 30px 30px 30px;
      box-shadow: 0 5px 20px var(--cor-sombra);
    }

    .story-section h3 {
      color: var(--cor-destaque);
      margin-bottom: 15px;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ========================================
           RESPONSIVO
           ======================================== */
    @media (max-width: 1200px) {
      .character-sheet {
        grid-template-columns: 1fr;
      }

      .sidebar {
        width: 200px;
        padding: 20px 15px;
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        padding: 20px;
        gap: 15px;
      }

      .header h1 {
        font-size: 32px;
      }

      .character-sheet {
        padding: 15px;
        gap: 15px;
      }

      .topbar {
        padding: 15px;
      }

      .panel {
        padding: 15px;
      }
    }

    /* ========================================
           SCROLL BAR ESTILIZADO
           ======================================== */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--cor-fundo-painel);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cor-borda);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--cor-destaque);
      box-shadow: 0 0 10px var(--cor-destaque);
    }
  </style>
</head>

      O município de Remanso do Tucano localiza-se na região nordeste do estado de Mato Grosso, a aproximadamente 70 quilômetros do município de Araguaia do Norte, conectado por uma rodovia estadual de pista simples cercada por áreas de cerrado, fazendas de criação bovina e pequenas reservas ambientais particulares. Possui população estimada em cerca de 20 mil habitantes, distribuídos entre a sede municipal, distritos rurais menores e propriedades agrícolas espalhadas ao redor das serras e rios da região.
      </p></br>

      <p>
      A economia local depende principalmente da agropecuária, do pequeno comércio regional e de atividades relacionadas à extração mineral em baixa escala, herança de antigos ciclos econômicos da região. O município mantém forte ligação comercial com Araguaia do Norte, funcionando parcialmente como ponto de apoio logístico e fornecedor agrícola para cidades maiores próximas.
      </p></br>

      <p>
      O centro urbano de Remanso do Tucano desenvolveu-se ao redor da Avenida das Garças e da Praça do Lago Azul, onde se concentram repartições públicas, mercados, farmácias, hotéis simples, oficinas mecânicas e restaurantes voltados ao atendimento de viajantes, caminhoneiros e trabalhadores rurais. Apesar do porte reduzido, a cidade apresenta infraestrutura relativamente organizada em comparação a outros municípios vizinhos do interior mato-grossense.
      </p></br>

      <p>
      A malha urbana mistura ruas largas planejadas durante períodos de expansão econômica com bairros periféricos construídos de forma improvisada ao longo das últimas décadas. Em períodos de estiagem, a poeira avermelhada cobre boa parte da cidade; durante as chuvas, áreas periféricas frequentemente enfrentam dificuldades de acesso devido ao acúmulo de lama e falhas de drenagem.
      </p></br>

      <p>
      Remanso do Tucano é conhecida regionalmente como “Capital dos Pássaros”, título informal atribuído pela grande diversidade de aves presentes nas matas e áreas alagadas ao redor do município. Tucanos, araras, garças, maracanãs e inúmeras espécies menores fazem parte da paisagem cotidiana da cidade, atraindo pesquisadores ambientais, fotógrafos e observadores de fauna durante determinadas épocas do ano.
      </p></br>

      <p>
      Além da fauna abundante, o município também ganhou notoriedade discreta pela presença de espécies botânicas raras encontradas em regiões úmidas próximas às serras. Entre elas destaca-se a flor chamada de Sonnentreppe Brazilis, catalogada informalmente por pesquisadores locais. A planta apresenta coloração amarelada intensa, pétalas em formato espiralado e propriedades químicas ainda pouco estudadas oficialmente.
      </p></br>

      <p>
      Nos últimos anos, algumas fazendas experimentais da região passaram a cultivar pequenas quantidades da flor para pesquisas voltadas à produção de compostos medicinais e anti-inflamatórios naturais. Relatórios internos mencionam o interesse preliminar de farmacêuticas internacionais na planta, embora nenhuma empresa estrangeira tenha estabelecido operações formais ou filiais no município até o presente momento.
      </p></br>

      <p>
      A infraestrutura pública municipal permanece limitada. O hospital local possui capacidade reduzida e frequentemente transfere pacientes graves para Araguaia do Norte. Serviços essenciais como saneamento, abastecimento de água e manutenção elétrica sofrem interrupções periódicas, especialmente nos bairros mais afastados e nas zonas rurais.
      </p></br>

      <p>
      A segurança pública é atendida por uma pequena companhia policial instalada em um prédio administrativo adaptado de uma antiga cooperativa agrícola desativada nos anos noventa. O efetivo policial é considerado suficiente apenas para ocorrências de rotina, havendo dependência frequente de reforços regionais em casos de maior gravidade.
      </p></br>

      <p>
      Durante a noite, Remanso do Tucano torna-se silenciosa e pouco movimentada. Após o fechamento do comércio, a cidade permanece iluminada apenas pelos postes antigos da região central e pelas luzes dispersas das propriedades rurais ao redor. O som predominante costuma ser o canto noturno das aves, o barulho constante dos insetos do cerrado e o vento atravessando as árvores próximas ao lago municipal.
      </p>
      `,
      conteudo: `
            <h3>Registro Histórico - Remanso do Tucano</h3>
            <p>
            Os primeiros registros permanentes de ocupação da região correspondente a Remanso do Tucano remontam às décadas de 1950 e 1960, quando pequenos grupos de criadores de gado, garimpeiros e trabalhadores rurais estabeleceram acampamentos provisórios próximos aos rios e áreas férteis do nordeste mato-grossense.
            </p></br>

            <p>
            O povoado original surgiu ao redor de um ponto de descanso utilizado por viajantes e tropeiros que cruzavam antigas rotas de terra em direção aos municípios maiores da região. O nome “Remanso do Tucano” teria origem em uma área de águas calmas próxima ao rio principal, conhecida pela presença constante de bandos de tucanos e outras aves típicas do cerrado mato-grossense.
            </p></br>

            <p>
            Durante as décadas seguintes, o crescimento populacional ocorreu de maneira lenta, sustentado principalmente pela pecuária extensiva, agricultura familiar e pequenas atividades de mineração artesanal realizadas nas serras próximas ao município.
            </p></br>

            <p>
            Nos anos oitenta, a expansão econômica de Araguaia do Norte impactou diretamente Remanso do Tucano. Novas estradas estaduais facilitaram o transporte de mercadorias, provocando aumento populacional gradual e crescimento do comércio local. Muitas famílias passaram a utilizar o município como alternativa mais tranquila e barata em relação às cidades maiores da região.
            </p></br>

            <p>
            A emancipação política ocorreu oficialmente no final da década de 1980, após sucessivas pressões de produtores rurais e comerciantes locais interessados em maior autonomia administrativa e investimentos públicos próprios.
            </p></br>

            <p>
            Durante os anos noventa, Remanso do Tucano consolidou-se como importante fornecedor agrícola regional, embora permanecesse dependente economicamente dos centros urbanos vizinhos. Nesse período também surgiram os primeiros registros científicos informais relacionados à flora rara encontrada nas áreas úmidas próximas às serras municipais.
            </p></br>

            <p>
            Pesquisadores universitários e botânicos independentes passaram a visitar regularmente a região após relatos sobre espécies vegetais incomuns que floresciam em condições ambientais específicas durante determinadas épocas do ano. A chamada Sonnentreppe Brazilis tornou-se gradualmente objeto de estudos acadêmicos discretos devido à composição química considerada incomum em análises preliminares.
            </p></br>

            <p>
            Relatórios administrativos produzidos entre 2002 e 2008 apontam aumento moderado do turismo ecológico ligado à observação de aves, trilhas ambientais e visitas às áreas de preservação natural existentes ao redor do município. Apesar disso, a cidade continua apresentando crescimento econômico lento e infraestrutura limitada para atividades turísticas em larga escala.
            </p></br>

            <p>
            Atualmente, Remanso do Tucano é considerada uma cidade pequena de relevância regional moderada, conhecida principalmente pela biodiversidade local, pela forte presença de aves silvestres e pelas histórias envolvendo suas espécies botânicas raras. Embora mantenha aparência pacata e rotina relativamente estável, o município permanece cercado por extensas áreas rurais isoladas e regiões ambientais pouco exploradas oficialmente.
            </p></br>

            <p>
            Moradores antigos frequentemente descrevem Remanso do Tucano como uma cidade “quieta demais para chamar atenção”, embora reconheçam que o município desperta curiosidade incomum entre pesquisadores ambientais, empresas privadas e visitantes ocasionais vindos de outras partes do país.
            </p>
          `,

    // ┌─────────────────────────────────────────────────────────────┐
    // │ FUNÇÃO: CARREGAR PERSONAGEM                                 │
    // │ Chama esta função quando o usuário clica em um botão        │
    // └─────────────────────────────────────────────────────────────┘
    function carregarPersonagem(indice) {
      // Esconder arquivo e mostrar ficha
      document.getElementById("fichaPersonagem").style.display = "grid";
      document.getElementById("viewArquivo").classList.remove("ativo");
      const pers = personagens[indice];
      const ficha = document.getElementById("fichaPersonagem");
      // Atualizar botões ativos
      document.querySelectorAll(".char-btn").forEach((btn, i) => {
        btn.classList.toggle("ativo", i === indice);
      });
      // Remover classe ativo dos botões de arquivo
      document
        .querySelectorAll(".side-btn")
        .forEach((btn) => btn.classList.remove("ativo-arquivo"));
      // HTML da ficha
      ficha.innerHTML = `
            <!-- PAINEL 1: IMAGEM -->
            <div class="panel">
                <h2>Perfil</h2>
                <img src="${pers.imagem}" alt="${pers.nome}" class="character-image">
                <div class="info-label">▸ Nome Completo</div>
                <div class="info-content">${pers.nome}</div>

                <div class="info-label">▸ Idade</div>
                <div class="info-content">${pers.idade}</div>

                <div class="info-label">▸ Gênero</div>
                <div class="info-content">${pers.genero}</div>

                <div class="info-label">▸ Orientação Sexual</div>
                <div class="info-content">${pers.orientacao_sexual}</div>

                <div class="info-label">▸ Ocupação</div>
                <div class="info-content">${pers.ocupacao}</div>

                <div class="info-label">▸ Altura</div>
                <div class="info-content">${pers.altura}</div>

                <div class="info-label">▸ Status</div>
                <div class="info-content">${pers.vivo}</div>
            </div>

            <!-- PAINEL 2: INFORMAÇÕES PRINCIPAIS -->
            <div class="panel">
                <h2>Informações</h2>

                <div class="info-label">▸ Personalidade</div>
                <div class="info-content">${pers.personalidade}</div>

                <div class="info-label">▸ História</div>
                <div class="info-content">${pers.historia}</div>
            </div>

            <!-- PAINEL 3: OBSERVAÇÕES E STATUS -->
            <div class="panel">
                <h2>Observações</h2>

                <ul class="lista-observacoes">
                    ${pers.observacoes.map((obs) => `<li>${obs}</li>`).join("")}
                </ul>

            </div>
        `;
      // Smooth scroll para o topo da ficha
      document
        .querySelector(".character-sheet")
        .scrollIntoView({
          behavior: "smooth"
        });
    }
    // ┌─────────────────────────────────────────────────────────────┐
    // │ FUNÇÃO: CARREGAR ARQUIVO                                    │
    // │ Chama esta função quando o usuário clica em um arquivo      │
    // └─────────────────────────────────────────────────────────────┘
    function carregarArquivo(id) {
      // Esconder ficha e mostrar arquivo
      document.getElementById("fichaPersonagem").style.display = "none";
      document.getElementById("viewArquivo").classList.add("ativo");
      // Encontrar arquivo
      const arquivo = arquivos.find((a) => a.id === id);
      if (!arquivo) return;
      const viewArquivo = document.getElementById("viewArquivo");
      // Atualizar botões ativos
      document.querySelectorAll(".side-btn").forEach((btn) => {
        btn.classList.toggle(
          "ativo-arquivo",
          btn.textContent.includes(arquivo.nome),
        );
      });
      // Remover classe ativo dos botões de personagem
      document
        .querySelectorAll(".char-btn")
        .forEach((btn) => btn.classList.remove("ativo"));
      // HTML do arquivo
      viewArquivo.innerHTML = `
            <!-- PAINEL 1: IMAGEM E DESCRIÇÃO -->
            <div class="panel">
                <h2>${arquivo.nome}</h2>
                <img src="${arquivo.imagem}" alt="${arquivo.nome}" class="arquivo-image">
                <p>${arquivo.descricao}</p>
            </div>

            <!-- PAINEL 2: CONTEÚDO DETALHADO -->
            <div class="panel">
                ${arquivo.conteudo}
            </div>
        `;
      // Smooth scroll para o topo
      viewArquivo.scrollIntoView({
        behavior: "smooth"
      });
    }
    // Carregar o primeiro personagem automaticamente
    carregarPersonagem(0);
  </script>
